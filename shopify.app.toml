# Shopify app configuration — COD Form APP (public)
name = "COD Form APP"
client_id = "9546e68cf31321c1da2582135c8db67c"
application_url = "https://api.codform.app"
embedded = true

[access_scopes]
scopes = "read_products,write_products,read_orders,write_orders,write_draft_orders,read_customers,write_customers,read_inventory,read_shipping,read_discounts,write_discounts,read_themes,write_themes,read_content,read_locales,read_markets"

[auth]
redirect_urls = ["https://api.codform.app/auth/callback"]

[webhooks]
api_version = "2025-01"

  [[webhooks.subscriptions]]
  topics = ["app/uninstalled"]
  uri = "/api/webhooks/app-uninstalled"

  [[webhooks.subscriptions]]
  topics = ["customers/data_request"]
  uri = "/api/webhooks/customers-data-request"

  [[webhooks.subscriptions]]
  topics = ["customers/redact"]
  uri = "/api/webhooks/customers-redact"

  [[webhooks.subscriptions]]
  topics = ["shop/redact"]
  uri = "/api/webhooks/shop-redact"

[proxy]
subpath = "cod-form"
prefix = "/"

[pos]
embedded = false
