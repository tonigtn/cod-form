# Shopify app configuration
# https://shopify.dev/docs/apps/tools/cli/configuration

name = "COD Order Form"
client_id = "YOUR_CLIENT_ID"
application_url = "https://your-domain.com"
embedded = true

[access_scopes]
scopes = "read_products,write_products,read_orders,write_orders,write_draft_orders,read_customers,write_customers,read_inventory,read_shipping,read_discounts,write_discounts,read_themes,write_themes,read_content,read_locales,read_markets"

[auth]
redirect_urls = ["https://your-domain.com/auth/callback"]

[webhooks]
api_version = "2025-01"

[pos]
embedded = false
